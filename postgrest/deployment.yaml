apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  namespace: postgrest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgrest
  template:
    metadata:
      labels:
        app: postgrest
    spec:
      containers:
        - name: postgrest
          image: postgrest/postgrest:v12.2.0
          ports:
            - containerPort: 3000
          env:
            - name: PGRST_DB_URI
              valueFrom:
                secretKeyRef:
                  name: postgrest-secret  # the Secret created by OpenTofu
                  key: db-uri             # the key inside that Secret
            - name: PGRST_DB_SCHEMA
              value: "public"             # expose the public schema
            - name: PGRST_DB_ANON_ROLE
              value: "postgrest_user"     # role used for unauthenticated requests
            - name: PGRST_SERVER_PORT
              value: "3000"
